name: Build Samsung A04 ReSukiSU Kernel & Pack AnyKernel3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex git git-lfs libssl-dev libcrypto++-dev lz4 binutils binutils-aarch64-linux-gnu libc6-dev-arm64-cross libc6-dev-i386 zip python3

    - name: Setup Proton Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git "$HOME/proton-clang"

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/DaniTheSillyFem/kernel_samsung_a04.git kernel-source

    - name: Integrate ReSukiSU & Custom Configurations
      run: |
        cd kernel-source

        # 1. استنساخ ReSukiSU مؤقتاً
        git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git temp_ksu
        
        # 2. إنشاء المجلد الهدف ونسخ المحتويات بالكامل
        mkdir -p drivers/kernelsu
        cp -a temp_ksu/kernel/. drivers/kernelsu/
        cp -r temp_ksu/.git drivers/kernelsu/

        # 3. نقل مجلد uapi إذا كان موجوداً
        if [ -d "temp_ksu/uapi" ]; then
          echo "Copying root uapi directory..."
          cp -r temp_ksu/uapi drivers/kernelsu/
        fi

        # إزالة المجلد المؤقت
        rm -rf temp_ksu

        # ----------------------------------------------------
        # إصلاح وتجهيز الترويسات المفقودة (SELinux & Seccomp)
        # ----------------------------------------------------
        mkdir -p include/linux
        if [ ! -f "include/linux/seccomp_types.h" ]; then
          echo "Creating stub include/linux/seccomp_types.h..."
          printf '%s\n' \
            '#ifndef _LINUX_SECCOMP_TYPES_H' \
            '#define _LINUX_SECCOMP_TYPES_H' \
            '#endif' > include/linux/seccomp_types.h
        fi

        mkdir -p security/selinux/include
        mkdir -p security/selinux/ss

        # إنشاء/تحديث policydb.h مع حقل policyvers
        printf '%s\n' \
          '#ifndef _POLICYDB_H_' \
          '#define _POLICYDB_H_' \
          '#include <linux/types.h>' \
          '' \
          '#define POLICYDB_VERSION_XPERMS_IOCTL 30' \
          '' \
          'struct policydb {' \
          '    u32 policyvers;' \
          '    void ***sym_val_to_name;' \
          '};' \
          'typedef struct policydb policydb_t;' \
          '' \
          '#endif' > security/selinux/ss/policydb.h

        # إنشاء flask.h
        printf '%s\n' \
          '#ifndef _FLASK_H_' \
          '#ifndef _SELINUX_FLASK_H_' \
          '#define _FLASK_H_' \
          '#define _SELINUX_FLASK_H_' \
          '' \
          '#define SECINITSID_NUM 27' \
          '#define SECINITSID_SECURITY 1' \
          '#ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS' \
          '#define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 7' \
          '#endif' \
          '' \
          '#define SECCLASS_SECURITY 1' \
          '#define SECCLASS_PROCESS 2' \
          '#define SECCLASS_SYSTEM 3' \
          '#define SECCLASS_CAPABILITY 4' \
          '#define SECCLASS_FILESYSTEM 5' \
          '#define SECCLASS_FILE 6' \
          '#define SECCLASS_DIR 7' \
          '#define SECCLASS_LNK_FILE 8' \
          '#define SECCLASS_CHR_FILE 9' \
          '#define SECCLASS_BLK_FILE 10' \
          '#define SECCLASS_SOCK_FILE 11' \
          '#define SECCLASS_FIFO_FILE 12' \
          '#define SECCLASS_SOCKET 13' \
          '' \
          '#endif' \
          '#endif' > security/selinux/include/flask.h

        # إنشاء av_permissions.h
        printf '%s\n' \
          '#ifndef _AV_PERMISSIONS_H_' \
          '#define _AV_PERMISSIONS_H_' \
          '' \
          '#define PERM_FILE__READ 0' \
          '#define PERM_FILE__WRITE 1' \
          '#define SECURITY__CHECK_CONTEXT 0' \
          '#define SECURITY__COMPUTE_AV 0' \
          '#define PROCESS__SETCURRENT 0' \
          '' \
          '#endif' > security/selinux/include/av_permissions.h

        # إنشاء avc.h
        printf '%s\n' \
          '#ifndef _AVC_H_' \
          '#define _AVC_H_' \
          '' \
          '#include "av_permissions.h"' \
          '#include "policydb.h"' \
          '' \
          'struct avc_cache { int dummy; };' \
          '' \
          '#endif' > security/selinux/include/avc.h

        # نسخ الترويسات للتحقق من وجودها بكل المسارات
        cp security/selinux/include/flask.h security/selinux/ss/flask.h
        cp security/selinux/include/av_permissions.h security/selinux/ss/av_permissions.h
        cp security/selinux/ss/policydb.h security/selinux/include/policydb.h
        cp security/selinux/include/avc.h security/selinux/ss/avc.h

        # ----------------------------------------------------
        # تطبيق الترقيعات لملفات KernelSU/ReSukiSU
        # ----------------------------------------------------
        echo "Applying refined compatibility patches..."
        
        # ترقيع objsec.h
        find security/ -name "objsec.h" -exec sed -i 's/current_cred()->security/NULL/g' {} + || true
        find security/ -name "objsec.h" -exec sed -i '/const struct task_security_struct \*tsec = current_security()/s/.*/const struct task_security_struct *tsec = NULL;/' {} + || true

        # ترقيع app_profile.c
        APP_PROFILE="drivers/kernelsu/policy/app_profile.c"
        if [ -f "$APP_PROFILE" ]; then
          echo "Patching $APP_PROFILE carefully..."
          sed -i 's/current_security()/NULL/g' "$APP_PROFILE"
          sed -i 's/const struct task_security_struct \*tsec = current_security()/const struct task_security_struct *tsec = NULL/' "$APP_PROFILE"
          sed -i 's/!current->seccomp\.mode/1/g' "$APP_PROFILE"
          sed -i 's/current->seccomp\.mode = 0/\/* bypassed *\//g' "$APP_PROFILE"
          sed -i 's/current->seccomp\.filter = NULL/\/* bypassed *\//g' "$APP_PROFILE"
        fi

        # ترقيع kernel_compat.h
        COMPAT_FILE="drivers/kernelsu/compat/kernel_compat.h"
        if [ -f "$COMPAT_FILE" ]; then
          echo "Patching $COMPAT_FILE early..."
          sed -i 's/return inode->i_security;/return NULL;/g' "$COMPAT_FILE"
          sed -i 's/return cred->security;/return NULL;/g' "$COMPAT_FILE"
          sed -i 's/return p->sym_val_to_name.*/return NULL;/g' "$COMPAT_FILE"
          
          echo "#ifndef current_security" >> "$COMPAT_FILE"
          echo "#define current_security() NULL" >> "$COMPAT_FILE"
          echo "#endif" >> "$COMPAT_FILE"
        fi

        # ترقيع selinux_hide.c و rules.c
        HIDE_FILE="drivers/kernelsu/feature/selinux_hide.c"
        if [ -f "$HIDE_FILE" ]; then
          echo "Injecting missing SELinux defines into $HIDE_FILE..."
          sed -i '1i #ifndef SECINITSID_SECURITY\n#define SECINITSID_SECURITY 1\n#endif\n#ifndef SECURITY__CHECK_CONTEXT\n#define SECURITY__CHECK_CONTEXT 0\n#endif\n#ifndef SECURITY__COMPUTE_AV\n#define SECURITY__COMPUTE_AV 0\n#endif\n#ifndef PROCESS__SETCURRENT\n#define PROCESS__SETCURRENT 0\n#endif' "$HIDE_FILE"
        fi

        RULES_FILE="drivers/kernelsu/selinux/rules.c"
        if [ -f "$RULES_FILE" ]; then
          echo "Patching $RULES_FILE for policyvers compatibility..."
          sed -i 's/db->policyvers/30/g' "$RULES_FILE" || true
        fi
        # ----------------------------------------------------

        # 4. تعطيل فحص static_export_check.mk
        mkdir -p drivers/kernelsu/tools
        echo "# Bypassed ReSukiSU Integration Check" > drivers/kernelsu/tools/static_export_check.mk

        # 5. تحويل الأخطاء القاطعة داخل Kbuild إلى تحذيرات
        KBUILD_FILE="drivers/kernelsu/Kbuild"
        if [ -f "$KBUILD_FILE" ]; then
          echo "Patching $KBUILD_FILE to disable fatal error stops..."
          sed -i 's/.*git submodule.*/# ignored/g' "$KBUILD_FILE"
          sed -i 's/\$(error/\$(warning/g' "$KBUILD_FILE"
        fi

        # 6. تعديل مسارات تضمين SELinux داخل ReSukiSU
        grep -rl '#include "flask.h"' drivers/kernelsu/ | xargs -r sed -i 's|#include "flask.h"|#include <security/selinux/include/flask.h>|g' || true
        grep -rl '#include "policydb.h"' drivers/kernelsu/ | xargs -r sed -i 's|#include "policydb.h"|#include <security/selinux/ss/policydb.h>|g' || true

        # 7. ربط ReSukiSU بملفات Makefile و Kconfig الرئيسية
        echo "obj-y += kernelsu/" >> drivers/Makefile
        sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

        # 8. إضافة إعدادات التكوين المبدئية إلى defconfig
        echo "CONFIG_LOCALVERSION=\"-TragicHorizon-v3-r1\"" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_SECURITY_SELINUX=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_SECURITY_SELINUX_BOOTPARAM=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS=7" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_I2C=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_I2C_CHARDEV=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_PM=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_PM_SLEEP=y" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_WAKELOCK=y" >> arch/arm64/configs/a04_defconfig

    - name: Apply Header & Driver Patches
      run: |
        cd kernel-source

        # 1. تصدير رمز sel_handle_status_ops في SELinux
        SELINUX_FILE="security/selinux/selinuxfs.c"
        if [ -f "$SELINUX_FILE" ]; then
          echo "Patching $SELINUX_FILE for ReSukiSU symbol export..."
          sed -i 's/static const struct seq_operations sel_handle_status_ops/const struct seq_operations sel_handle_status_ops/g' "$SELINUX_FILE"
          if ! grep -q "EXPORT_SYMBOL(sel_handle_status_ops)" "$SELINUX_FILE"; then
            sed -i '/^const struct seq_operations sel_handle_status_ops/a EXPORT_SYMBOL(sel_handle_status_ops);' "$SELINUX_FILE"
          fi
        fi

        # 2. إصلاح تضمينات wakelock
        WAKELOCK_FILE="include/linux/wakelock.h"
        if [ -f "$WAKELOCK_FILE" ]; then
          echo "Patching $WAKELOCK_FILE..."
          sed -i 's/#include <linux\/wakeup_source.h>/#include <linux\/pm_wakeup.h>/g' "$WAKELOCK_FILE"
        fi

        # 3. إصلاح سائق hx9023s.c
        DRIVER_FILE="drivers/input/hx9023_sar/hx9023s.c"
        if [ -f "$DRIVER_FILE" ]; then
          echo "Patching $DRIVER_FILE..."
          sed -i 's/#include <linux\/wakeup_source.h>/#include <linux\/pm_wakeup.h>/g' "$DRIVER_FILE"
          sed -i 's/for (size_t index = 0;/size_t index; for (index = 0;/g' "$DRIVER_FILE"
          sed -i 's/for (int i = 0;/int i; for (i = 0;/g' "$DRIVER_FILE"
        fi

    - name: Build Kernel
      run: |
        cd kernel-source

        export PATH="/usr/bin:/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/sbin:$HOME/proton-clang/bin"
        unset LD_LIBRARY_PATH

        export ARCH=arm64
        export SUBARCH=arm64
        export CC="$HOME/proton-clang/bin/clang"
        export CXX="$HOME/proton-clang/bin/clang++"
        export HOSTCC=gcc
        export HOSTCXX=g++
        export CROSS_COMPILE=aarch64-linux-gnu-

        export LD=aarch64-linux-gnu-ld
        export HOSTLD=/usr/bin/ld
        export AR=aarch64-linux-gnu-ar
        export OBJCOPY=aarch64-linux-gnu-objcopy
        export STRIP=aarch64-linux-gnu-strip
        export LDFLAGS="-Wl,--no-relax"
        
        export KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-error=incompatible-pointer-types"

        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" a04_defconfig

        if [ -f "scripts/config" ]; then
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-TragicHorizon-v3-r1"
          ./scripts/config --file out/.config --enable CONFIG_SECURITY_SELINUX
          ./scripts/config --file out/.config --set-val CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 7
          ./scripts/config --file out/.config --enable CONFIG_KALLSYMS
          ./scripts/config --file out/.config --enable CONFIG_KALLSYMS_ALL
          ./scripts/config --file out/.config --enable CONFIG_KSU
          make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" olddefconfig
        fi

        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

        cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        sed -i 's/device.name1=/device.name1=a04/g' anykernel.sh
        sed -i 's/block=/block=\/dev\/block\/by-name\/boot/g' anykernel.sh

        zip -r9 "../TragicHorizon-v3-r1-Samsung-A04.zip" * -x .git README.md

    - name: Upload AnyKernel3 Package
      uses: actions/upload-artifact@v4
      with:
        name: TragicHorizon-v3-r1-Samsung-A04
        path: TragicHorizon-v3-r1-Samsung-A04.zip
