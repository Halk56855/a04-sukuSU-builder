name: Build Samsung A04 ReSukiSU Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Build Tools
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex git git-lfs libssl-dev libcrypto++-dev lz4 binutils-aarch64-linux-gnu

    - name: Setup Proton Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git "$HOME/proton-clang"
        echo "$HOME/proton-clang/bin" >> $GITHUB_PATH

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/DaniTheSillyFem/kernel_samsung_a04.git kernel-source

    - name: Integrate ReSukiSU
      run: |
        cd kernel-source
        git submodule add https://github.com/ReSukiSU/ReSukiSU.git drivers/kernelsu
        echo "obj-y += kernelsu/" >> drivers/Makefile
        sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/a04_defconfig || true

    - name: Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        make O=out a04_defconfig
        make O=out -j$(nproc)

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-A04-ReSukiSU-Kernel
        path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
