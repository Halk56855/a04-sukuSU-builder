name: Build Samsung A04 ReSukiSU Kernel & Pack AnyKernel3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex git git-lfs libssl-dev libcrypto++-dev lz4 binutils binutils-aarch64-linux-gnu libc6-dev-arm64-cross libc6-dev-i386 zip

    - name: Setup Proton Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git "$HOME/proton-clang"

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/DaniTheSillyFem/kernel_samsung_a04.git kernel-source

    - name: Integrate ReSukiSU & Custom Configurations
      run: |
        cd kernel-source
        # استنساخ ReSukiSU ونقل مجلد النواة
        git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git temp_ksu
        mv temp_ksu/kernel drivers/kernelsu
        rm -rf temp_ksu

        # ربط الكود بملفات Makefile و Kconfig
        echo "obj-y += kernelsu/" >> drivers/Makefile
        sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

        # تعيين اسم النواة المخصص والتكوينات المطلوبة
        echo "CONFIG_LOCALVERSION=\"-TragicHorizon-v3-r1\"" >> arch/arm64/configs/a04_defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/a04_defconfig || true
        echo "CONFIG_I2C=y" >> arch/arm64/configs/a04_defconfig || true
        echo "CONFIG_I2C_CHARDEV=y" >> arch/arm64/configs/a04_defconfig || true
        echo "CONFIG_PM=y" >> arch/arm64/configs/a04_defconfig || true
        echo "CONFIG_PM_SLEEP=y" >> arch/arm64/configs/a04_defconfig || true
        echo "CONFIG_WAKELOCK=y" >> arch/arm64/configs/a04_defconfig || true

    - name: Apply Header & Driver Patches
      run: |
        cd kernel-source

        # 1. إزالة أي تضمين لـ wakeup_source.h إذا كان موجوداً واستبداله بـ pm_wakeup.h
        WAKELOCK_FILE="include/linux/wakelock.h"
        if [ -f "$WAKELOCK_FILE" ]; then
          echo "Patching $WAKELOCK_FILE..."
          sed -i 's/#include <linux\/wakeup_source.h>/#include <linux\/pm_wakeup.h>/g' "$WAKELOCK_FILE"
          sed -i '1i #include <linux/pm_wakeup.h>' "$WAKELOCK_FILE"
        fi

        # 2. إزالة wakeup_source.h وتعديل الحلقات في سائق hx9023s.c
        DRIVER_FILE="drivers/input/hx9023_sar/hx9023s.c"
        if [ -f "$DRIVER_FILE" ]; then
          echo "Patching $DRIVER_FILE..."
          sed -i 's/#include <linux\/wakeup_source.h>/#include <linux\/pm_wakeup.h>/g' "$DRIVER_FILE"
          sed -i '1i #include <linux/i2c.h>\n#include <linux/pm_wakeup.h>' "$DRIVER_FILE"
          sed -i 's/for (size_t index = 0;/size_t index; for (index = 0;/g' "$DRIVER_FILE"
          sed -i 's/for (int i = 0;/int i; for (i = 0;/g' "$DRIVER_FILE"
        fi

    - name: Build Kernel
      run: |
        cd kernel-source

        # إعداد مسارات النظام والمتغيرات
        export PATH="/usr/bin:/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/sbin:$HOME/proton-clang/bin"
        unset LD_LIBRARY_PATH

        export ARCH=arm64
        export SUBARCH=arm64
        export CC="$HOME/proton-clang/bin/clang"
        export CXX="$HOME/proton-clang/bin/clang++"
        export HOSTCC=gcc
        export HOSTCXX=g++
        export CROSS_COMPILE=aarch64-linux-gnu-

        export LD=aarch64-linux-gnu-ld
        export HOSTLD=/usr/bin/ld
        export AR=aarch64-linux-gnu-ar
        export OBJCOPY=aarch64-linux-gnu-objcopy
        export STRIP=aarch64-linux-gnu-strip
        export LDFLAGS="-Wl,--no-relax"
        export KCFLAGS="-Wno-error -Wno-implicit-function-declaration"

        # إعداد التهيئة أولاً
        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" a04_defconfig

        # تفعيل إعدادات النظام واسم النواة
        if [ -f "scripts/config" ]; then
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-TragicHorizon-v3-r1"
          ./scripts/config --file out/.config --enable CONFIG_I2C
          ./scripts/config --file out/.config --enable CONFIG_PM
          ./scripts/config --file out/.config --enable CONFIG_PM_SLEEP
          ./scripts/config --file out/.config --enable CONFIG_WAKELOCK
          make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" olddefconfig
        fi

        # بدء عملية التجميع
        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld LD=aarch64-linux-gnu-ld CC="$CC" -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

        cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        sed -i 's/device.name1=/device.name1=a04/g' anykernel.sh
        sed -i 's/block=/block=\/dev\/block\/by-name\/boot/g' anykernel.sh

        zip -r9 "../TragicHorizon-v3-r1-Samsung-A04.zip" * -x .git README.md

    - name: Upload AnyKernel3 Package
      uses: actions/upload-artifact@v4
      with:
        name: TragicHorizon-v3-r1-Samsung-A04
        path: TragicHorizon-v3-r1-Samsung-A04.zip
