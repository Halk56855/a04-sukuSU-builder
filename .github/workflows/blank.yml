name: Build Samsung A04 ReSukiSU Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Build Tools
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex git git-lfs libssl-dev libcrypto++-dev lz4 binutils binutils-aarch64-linux-gnu

    - name: Setup Proton Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git "$HOME/proton-clang"

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/DaniTheSillyFem/kernel_samsung_a04.git kernel-source

    - name: Integrate ReSukiSU
      run: |
        cd kernel-source
        # استنساخ ReSukiSU ونقل ملفات النواة إلى drivers/kernelsu
        git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git temp_ksu
        mv temp_ksu/kernel drivers/kernelsu
        rm -rf temp_ksu

        # إضافة التوجيهات إلى Makefile و Kconfig
        echo "obj-y += kernelsu/" >> drivers/Makefile
        sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        
        # تفعيل CONFIG_KSU في defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/a04_defconfig || true

    - name: Patch Driver Source Errors
      run: |
        cd kernel-source
        # إضافة المكتبات المفقودة لملف hx9023s.c
        if [ -f "drivers/input/hx9023_sar/hx9023s.c" ]; then
          sed -i '1i #include <linux/i2c.h>\n#include <linux/pm_wakeup.h>' drivers/input/hx9023_sar/hx9023s.c
          sed -i 's/for (size_t index = 0;/size_t index; for (index = 0;/g' drivers/input/hx9023_sar/hx9023s.c
          sed -i 's/for (int i = 0;/int i; for (i = 0;/g' drivers/input/hx9023_sar/hx9023s.c
        fi

    - name: Build Kernel
      run: |
        cd kernel-source
        
        # ضبط مسارات النظام وأدوات الربط (Linker)
        export PATH="/usr/bin:/bin:$HOME/proton-clang/bin:$PATH"
        export LD_LIBRARY_PATH="$HOME/proton-clang/lib:$LD_LIBRARY_PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++
        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld
        export CROSS_COMPILE=aarch64-linux-gnu-

        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld a04_defconfig
        make O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=/usr/bin/ld KCFLAGS="-Wno-error" -j$(nproc)

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-A04-ReSukiSU-Kernel
        path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
